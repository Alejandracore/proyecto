<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch.ME - Oferta Especial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
        .font-bebas { font-family: 'Bebas Neue', cursive; }
    </style>
</head>
<body class="bg-[#1a202c] text-white antialiased">

    <main class="min-h-screen flex flex-col justify-center">
        <header class="p-6">
            <div class="container mx-auto">
                <div class="uppercase font-black text-3xl tracking-tighter">
                    <span class="text-xl font-bold tracking-tight">Nevekley<span class="text-pink-500">store</span></span>
                </div>
            </div>
        </header>

        <div class="container mx-auto px-6 flex flex-col lg:flex-row items-center gap-12 py-10">
            
            <div class="lg:w-2/5 flex flex-col mb-10 lg:mb-0">
                <span class="w-20 h-1 bg-white mb-8"></span>
                <h1 class="font-bebas uppercase text-8xl sm:text-9xl font-black leading-[0.8] mb-6">
                        Reloj<br>
                    <span class="text-white">Inteligente</span>
                </h1>
                <p class="text-lg text-gray-300 mb-8 max-w-md">
                    ¿Quieres un SmartWatch Bonito, de calidad, y accesible? Puedes obtenerlo a tan solo <span class="text-white font-bold text-xl">$2,200 RD$</span>.
                    <br><br>
                    ¡El smartwatch del momento! Casi un Apple Watch, ¡pero al mejor precio del mercado!
                </p>
                
                <div class="flex flex-col sm:flex-row gap-4">
                    <a href="Contactos.HTML" class="text-center uppercase py-4 px-8 rounded-lg bg-pink-600 text-white font-bold hover:bg-pink-500 transition shadow-lg">
                        ¡Contáctanos ahora!
                    </a>
                    <a href="Inicio.HTML" class="text-center uppercase py-4 px-8 rounded-lg border-2 border-pink-600 text-pink-500 font-bold hover:bg-pink-600 hover:text-white transition">
                         Volver a Inicio
                    </a>
                </div>
            </div>

            <div class="lg:w-3/5 w-full">
                <div class="grid grid-cols-2 gap-6">
                    
                    <div class="col-span-2 overflow-hidden rounded-2xl border-2 border-gray-700 shadow-xl aspect-[11/10]">
                        <img src="oferta 1.jpeg" alt="Smartwatch 1" class="w-full h-full object-cover hover:scale-105 transition duration-500">
                    </div>
                    
                    <div class="overflow-hidden rounded-2xl border-2 border-gray-700 shadow-xl aspect-square">
                        <img src="oferta 2.jpeg" alt="Smartwatch 2" class="w-full h-full object-cover hover:scale-105 transition duration-500">
                    </div>
                    
                    <div class="overflow-hidden rounded-2xl border-2 border-gray-700 shadow-xl aspect-square">
                        <img src="oferta 3.jpeg" alt="Smartwatch 3" class="w-full h-full object-cover hover:scale-105 transition duration-500">
                    </div>

                </div>
            </div>

        </div>
    </main>

</body>
</html>

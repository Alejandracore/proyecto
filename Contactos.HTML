<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos</title>
</head>

<body>
    <script src="https://cdn.tailwindcss.com"></script>

    <div class="min-h-screen bg-gray-900 py-6 flex flex-col justify-center sm:py-12">
        <div class="relative py-3 sm:max-w-xl sm:mx-auto">

            <!-- FONDO (mantiene diseño, solo color) -->
            <div
                class="absolute inset-0 bg-gradient-to-r from-pink-600 to-transparent shadow-lg transform -skew-y-6 sm:skew-y-0 sm:-rotate-6 sm:rounded-3xl">
            </div>

            <!-- CARD -->
            <div class="text-white relative px-4 py-10 bg-gray-800 shadow-lg sm:rounded-3xl sm:p-20">

                <div class="text-center pb-6">
                    <h1 class="text-3xl text-pink-400 font-bold">Contactanos</h1>
                    <p class="text-gray-400">
                        ¿Tienes alguna duda o necesitas asistencia? Escríbenos a través del formulario o contáctanos por
                        cualquiera de nuestros medios. ¡Con gusto te ayudaremos!
                    </p>
                </div>

                <!-- Alerta éxito -->
                <div id="alerta-ok" class="hidden mb-4 flex items-center gap-2 bg-green-800/40 border border-green-500/40 text-green-400 px-4 py-3 rounded-lg text-sm">
                    ✅ ¡Mensaje enviado! Te contactaremos pronto.
                </div>
                <!-- Alerta error -->
                <div id="alerta-err" class="hidden mb-4 flex items-center gap-2 bg-red-800/40 border border-red-500/40 text-red-400 px-4 py-3 rounded-lg text-sm">
                    ❌ Por favor completa todos los campos requeridos.
                </div>

                <form action="guardar_contacto.php" method="POST">

                    <input
                        class="shadow mb-4 appearance-none border border-gray-600 rounded w-full py-2 px-3 bg-gray-800 text-white leading-tight focus:outline-none focus:shadow-outline"
                        type="text" placeholder="Nombre" name="nombre">

                    <input
                        class="shadow mb-4 appearance-none border border-gray-600 rounded w-full py-2 px-3 bg-gray-800 text-white leading-tight focus:outline-none focus:shadow-outline"
                        type="email" placeholder="Email" name="email">

                    <input
                        class="shadow mb-4 appearance-none border border-gray-600 rounded w-full py-2 px-3 bg-gray-800 text-white leading-tight focus:outline-none focus:shadow-outline"
                        type="number" placeholder="Telefono" name="telefono">

                    <textarea
                        class="shadow mb-4 min-h-0 appearance-none border border-gray-600 rounded h-64 w-full py-2 px-3 bg-gray-800 text-white leading-tight focus:outline-none focus:shadow-outline"
                        placeholder="Escriba su mensaje aqui" name="mensaje" style="height: 121px;"></textarea>

                    <div class="flex justify-between">

                        <!-- BOTONES -->
                        <input
                            class="shadow bg-pink-600 hover:bg-pink-500 text-white font-bold py-2 px-4 rounded shadow-pink-600/40 focus:outline-none focus:shadow-outline"
                            type="submit" value="Enviar ➤">

                        <input
                            class="shadow bg-pink-600 hover:bg-pink-500 text-white font-bold py-2 px-4 rounded shadow-pink-600/40 focus:outline-none focus:shadow-outline"
                            type="reset">

                    </div>

                    <!-- VOLVER -->
                    <div class="pt-5 text-left">
                        <a id="btn-volver" href="Inicio.HTML"
                            class="text-white text-sm hover:text-pink-400 transition duration-300 inline-block">
                            ← Volver
                        </a>
                        <script>
                          const p = new URLSearchParams(window.location.search);
                          if (p.get('from') === 'panel') {
                            document.getElementById('btn-volver').href = 'usuario.php';
                            document.getElementById('btn-volver').textContent = '← Volver al panel';
                          }
                          if (p.get('enviado') === 'ok')  document.getElementById('alerta-ok').classList.remove('hidden');
                          if (p.get('error'))             document.getElementById('alerta-err').classList.remove('hidden');
                        </script>
                    </div>


                </form>
            </div>
        </div>
    </div>

</body>

</html>
